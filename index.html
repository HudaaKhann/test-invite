<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invite</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

  <!-- TOP TEXT -->
  <h1 class="title">Rowan & Aly</h1>
  <p class="subtitle">are getting married!</p>

  <!-- ENVELOPE -->
  <div class="envelope-container" id="envelope">
    <img src="assets/envelope.svg" class="envelope">

    <!-- SEAL -->
    <div class="seal">
      <img src="assets/emblem.svg">
    </div>
  </div>

  <p class="click-text">click to open...</p>
  <p class="date">30 • 10 • 2025</p>

  <!-- CARD -->
  <div class="card hidden" id="card">

    <div class="card-bg"></div>

    <!-- FRAME SVG -->
    <img src="assets/frame.svg" class="frame">

    <!-- CONTENT -->
    <div class="card-content">
      <h2>Rowan & Aly</h2>
      <p>request the honor of your presence</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
